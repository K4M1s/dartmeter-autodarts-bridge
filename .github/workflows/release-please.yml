name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below runs only when a release was just created.
      - name: Validate sources
        if: ${{ steps.release.outputs.release_created }}
        run: |
          for f in src/*.js; do node --check "$f"; done
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Package extension zip
        if: ${{ steps.release.outputs.release_created }}
        run: |
          zip -r "dartmeter-autodarts-bridge-${{ steps.release.outputs.tag_name }}.zip" \
            manifest.json src LICENSE README.md

      - name: Attach zip to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            dartmeter-autodarts-bridge-*.zip --clobber
